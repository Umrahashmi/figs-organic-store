<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figs Organic | Premium Handmade Care</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <h1 class="logo">Figs Organic</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search our botanical collection...">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div class="cart-icon" id="cartOpenBtn">
                <i class="fas fa-shopping-bag"></i>
                <span id="cartCount">0</span>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <video autoplay loop muted playsinline class="hero-video">
                <source src="bg.mp4" type="video/mp4">
            </video>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h2>Pure. Earthy. Minimalist.</h2>
                <p>Discover our range of handcrafted care, featuring nature's finest ingredients.</p>
            </div>
        </section>

        <section class="store-controls">
            <div class="filters" id="categoryFilters">
                <button class="filter-btn active" data-category="all">All</button>
            </div>
        </section>

        <section class="products-grid" id="productsContainer">
            <div class="loading">Sourcing ingredients and loading products...</div>
        </section>
    </main>

    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Your Basket</h2>
            <button id="cartCloseBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotalValue">₹0</span>
            </div>
            <button id="checkoutBtn" class="checkout-btn">Checkout via WhatsApp <i class="fab fa-whatsapp"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
